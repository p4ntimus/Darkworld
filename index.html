<!DOCTYPE html>
<html lang="de">
<head>

    <title>DarkWorld</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">

</head>
<body>

<!-- JS -->
<script type="module" src="assets/js/main.js"></script>

</body>
</html>
